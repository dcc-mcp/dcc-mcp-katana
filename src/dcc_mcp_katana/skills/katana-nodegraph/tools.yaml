tools:
  - name: inspect_nodegraph
    description: Return root, selected, and viewed node metadata without changing Katana.
    input_schema: {type: object, properties: {}}
    read_only: true
    destructive: false
    idempotent: true
    execution: sync
    affinity: main
    timeout_hint_secs: 15
    source_file: scripts/inspect_nodegraph.py
  - name: list_nodes
    description: List nodes in the active Katana project without modifying it.
    input_schema: {type: object, properties: {}}
    read_only: true
    destructive: false
    idempotent: true
    execution: sync
    affinity: main
    timeout_hint_secs: 30
    source_file: scripts/list_nodes.py
  - name: save_project
    description: Save the Katana project to an explicit absolute .katana path.
    input_schema:
      type: object
      required: [path]
      properties: {path: {type: string, description: Absolute .katana output path.}}
    read_only: false
    destructive: true
    idempotent: false
    execution: sync
    affinity: main
    timeout_hint_secs: 60
    source_file: scripts/save_project.py
